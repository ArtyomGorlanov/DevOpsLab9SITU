name: Publish Docker image
#FD
on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  push_to_registry:
    name: Push Docker image to Docker Hub
    runs-on: ubuntu-24.04

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: ./server
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/devopslab9situ:latest

  touch-k8s-manifest:
    name: Update K8s manifest with release date
    needs: push_to_registry
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Insert release date
        run: |
          sed -i "s/release-date: .*$/release-date: $(date +%s)/g" ./server-k8s-manifests/devopslab9situ.yml

      - name: Commit manifest
        run: |
          git config --global user.name "Release Runner"
          git config --global user.email "runner@users.noreply.github.com"
          git checkout main
          git add ./server-k8s-manifests/devopslab9situ.yml
          git commit -m "Release $(date +%s)" || echo "No changes to commit"
          git push origin main:release
